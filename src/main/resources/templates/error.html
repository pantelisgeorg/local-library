<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Local Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .error-message {
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            background: var(--background);
            padding: 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            color: var(--danger);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-book-open me-2"></i>Local Library
            </a>
            <div class="navbar-nav">
                <a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Home</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="main-card border-danger">
                    <div class="card-header" style="background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);">
                        <span><i class="fas fa-exclamation-triangle me-2"></i><span th:text="${error} ?: 'Error'">Error</span></span>
                    </div>
                    <div class="card-body">
                        <h6 class="text-muted mb-3">Error Details:</h6>
                        <div class="error-message mb-4">
                            <th:block th:if="${message != null}" th:text="${message}"></th:block>
                            <th:block th:unless="${message != null}">No error details available.</th:block>
                        </div>
                        <p class="text-muted small">If this problem persists, please check the application logs for more details.</p>
                        <a href="/" class="btn btn-primary">
                            <i class="fas fa-home me-2"></i>Return to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p class="mb-0">Local Library - Personal File Management System</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
