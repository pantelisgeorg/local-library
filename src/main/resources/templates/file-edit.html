<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit File - Local Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-book-open me-2"></i>Local Library
            </a>
            <div class="navbar-nav">
                <a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Home</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- Back Button -->
        <div class="mb-3">
            <a th:href="@{|/folder/${file.folder?.id}|}" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-2"></i>Back to Folder
            </a>
        </div>

        <div class="row">
            <div class="col-md-6 mx-auto">
                <div class="main-card">
                    <div class="card-header">
                        <span><i class="fas fa-edit me-2"></i>Edit File Details</span>
                    </div>
                    <div class="card-body">
                        <form th:action="@{|/file/${file.id}/edit|}" method="post">
                            <div class="mb-3">
                                <label for="title" class="form-label">Title</label>
                                <input type="text" class="form-control" id="title" name="title" required
                                       th:value="${file.title}" placeholder="Enter file title">
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" name="description" rows="4"
                                          th:text="${file.description}" placeholder="Enter file description"></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">File Information</label>
                                <div class="p-3 rounded" style="background: var(--background);">
                                    <div class="d-flex justify-content-between py-2 border-bottom" style="border-color: var(--border) !important;">
                                        <span class="text-muted">Original Name:</span>
                                        <span class="fw-medium" th:text="${file.fileName}">filename.pdf</span>
                                    </div>
                                    <div class="d-flex justify-content-between py-2 border-bottom" style="border-color: var(--border) !important;">
                                        <span class="text-muted">Type:</span>
                                        <span class="badge" th:classappend="'badge-' + ${file.fileType.toLowerCase()}" th:text="${file.fileType}">PDF</span>
                                    </div>
                                    <div class="d-flex justify-content-between py-2">
                                        <span class="text-muted">Size:</span>
                                        <span class="fw-medium" th:text="${file.formattedFileSize}">2.5 MB</span>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a th:href="@{|/folder/${file.folder?.id}|}" class="btn btn-secondary">
                                    <i class="fas fa-times me-2"></i>Cancel
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i>Save Changes
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p class="mb-0">Local Library - Personal File Management System</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
