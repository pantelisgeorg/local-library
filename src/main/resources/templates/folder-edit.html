<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Folder - Local Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-book-open me-2"></i>Local Library
            </a>
            <div class="navbar-nav">
                <a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Home</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- Back Button -->
        <div class="mb-3">
            <a th:href="@{/folder/{id}(id=${folder.id})}" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-2"></i>Back to Folder
            </a>
        </div>

        <div class="row">
            <div class="col-md-6 mx-auto">
                <div class="main-card">
                    <div class="card-header">
                        <span><i class="fas fa-folder-open me-2"></i>Edit Folder</span>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/folder/{id}/edit(id=${folder.id})}" method="post">
                            <div class="mb-3">
                                <label for="name" class="form-label">Folder Name</label>
                                <input type="text" class="form-control" id="name" name="name" required
                                       th:value="${folder.name}" placeholder="Enter folder name">
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" name="description" rows="4"
                                          th:text="${folder.description}" placeholder="Enter folder description"></textarea>
                            </div>

                            <div class="mb-4">
                                <label for="parentId" class="form-label">Move to Parent Folder</label>
                                <select class="form-select" id="parentId" name="parentId">
                                    <option value="">Root (No Parent)</option>
                                    <th:block th:each="f : ${allFolders}">
                                        <option th:value="${f.id}" th:text="${f.name}"
                                                th:selected="${folder.parent != null and folder.parent.id == f.id}">
                                            Folder Name
                                        </option>
                                    </th:block>
                                </select>
                                <small class="text-muted">Select a parent folder to move this folder inside it</small>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a th:href="@{/folder/{id}(id=${folder.id})}" class="btn btn-secondary">
                                    <i class="fas fa-times me-2"></i>Cancel
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i>Save Changes
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p class="mb-0">Local Library - Personal File Management System</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
